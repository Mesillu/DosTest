<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DosPordos</title>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Vercel Analytics (optional fallback for non-module environments) -->
  <script defer src="https://cdn.jsdelivr.net/npm/@vercel/analytics/dist/analytics.min.js"></script>
</head>
<body>
  <header>
    <h1>HTTP Flood Dashboard</h1>
  </header>

  <main>
    <section class="metrics-grid">
      <div class="metric-card">
        <i class="fas fa-network-wired"></i>
        <h2 id="activeConnections">0</h2>
        <p>Active Connections</p>
      </div>
      <div class="metric-card">
        <i class="fas fa-clock"></i>
        <h2 id="rpm">0</h2>
        <p>Requests / Minute</p>
      </div>
      <div class="metric-card">
        <i class="fas fa-bolt"></i>
        <h2 id="rps">0</h2>
        <p>Requests / Second</p>
      </div>
      <div class="metric-card">
        <i class="fas fa-database"></i>
        <h2 id="dataReceived">0 MB</h2>
        <p>Data Received</p>
      </div>
      <div class="metric-card">
        <i class="fas fa-tachometer-alt"></i>
        <h2 id="latency">0 ms</h2>
        <p>Average Latency</p>
      </div>
      <div class="metric-card">
        <i class="fas fa-exclamation-triangle"></i>
        <h2 id="errorRate">0%</h2>
        <p>Error Rate</p>
      </div>
    </section>

    <section class="charts-grid">
      <div class="chart-container">
        <canvas id="rpmChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="rpsChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="latencyChart"></canvas>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 HTTP Flood Dashboard</p>
  </footer>

  <!-- JS -->
  <script type="module" src="script.js"></script>
</body>
          </html>
